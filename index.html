<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Digital - SS 2027</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- HEADER -->
    <header class="header">
        <div class="header-container">
            <div class="logo">
                <h1>CATÁLOGO DIGITAL</h1>
                <p class="tagline">Made for summer. SS 2027</p>
            </div>
            <div class="header-right">
                <button class="cart-button" id="cartBtn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <circle cx="9" cy="21" r="1"/>
                        <circle cx="20" cy="21" r="1"/>
                        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
                    </svg>
                    <span id="cartCount" class="cart-count">0</span>
                </button>
            </div>
        </div>
    </header>

    <!-- MAIN CONTAINER -->
    <div class="container">
        <!-- SIDEBAR - FILTROS -->
        <aside class="sidebar">
            <nav class="filters">
                <h2 class="filters-title">Colecciones</h2>
                
                <div class="filter-group">
                    <button class="collection-btn active" data-collection="all">
                        Todas las colecciones
                    </button>
                </div>

                <div id="collectionFilters" class="filter-group">
                    <!-- Se generará dinámicamente con JavaScript -->
                </div>

                <h2 class="filters-title" style="margin-top: 2rem;">Género</h2>
                <div class="filter-group" id="genderFilters">
                    <button class="gender-btn active" data-gender="all">
                        Todos
                    </button>
                </div>

                <h2 class="filters-title" style="margin-top: 2rem;">Categoría</h2>
                <div class="filter-group" id="categoryFilters">
                    <button class="category-btn active" data-category="all">
                        Todas las categorías
                    </button>
                </div>
            </nav>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="main-content">
            <!-- BREADCRUMB -->
            <div class="breadcrumb" id="breadcrumb">
                <span>Inicio</span>
            </div>

            <!-- PRODUCTS GRID -->
            <div id="productsGrid" class="products-grid">
                <!-- Se generará dinámicamente con JavaScript -->
            </div>

            <!-- EMPTY STATE -->
            <div id="emptyState" class="empty-state" style="display: none;">
                <p>No hay productos disponibles con estos filtros.</p>
            </div>
        </main>
    </div>

    <!-- MODAL DE DETALLE DE PRODUCTO -->
    <div id="productModal" class="modal">
        <div class="modal-content">
            <button class="modal-close" id="closeModal">&times;</button>
            <div class="modal-body">
                <div class="modal-image">
                    <img id="modalProductImage" src="" alt="Producto">
                </div>
                <div class="modal-info">
                    <h2 id="modalProductName"></h2>
                    <p id="modalProductDescription" class="product-description"></p>
                    
                    <div class="product-details">
                        <div class="detail-item">
                            <label>Colección</label>
                            <p id="modalProductCollection"></p>
                        </div>
                        <div class="detail-item">
                            <label>Género</label>
                            <p id="modalProductGender"></p>
                        </div>
                        <div class="detail-item">
                            <label>Cantidad de piezas</label>
                            <p id="modalProductPCS"></p>
                        </div>
                    </div>

                    <div id="colorSection" class="color-section">
                        <h3>Colores disponibles</h3>
                        <div id="colorOptions" class="color-options">
                            <!-- Se generará dinámicamente -->
                        </div>
                    </div>

                    <div id="sizeSection" class="size-section">
                        <h3>Talles</h3>
                        <div id="sizeOptions" class="size-options">
                            <!-- Se generará dinámicamente -->
                        </div>
                    </div>

                    <button id="addToCartBtn" class="btn btn-primary" style="width: 100%; margin-top: 2rem;">
                        Añadir a mi selección
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- CARRITO LATERAL -->
    <div id="cartSidebar" class="cart-sidebar">
        <div class="cart-header">
            <h2>Mi Selección</h2>
            <button id="closeCart" class="close-cart">&times;</button>
        </div>
        <div id="cartItems" class="cart-items">
            <!-- Se genera dinámicamente -->
        </div>
        <div id="emptyCart" class="empty-cart">
            <p>Tu selección está vacía</p>
        </div>
        <div class="cart-footer">
            <button id="downloadPdfBtn" class="btn btn-primary" style="display: none; width: 100%;">
                Descargar PDF y Cotizar por WhatsApp
            </button>
        </div>
    </div>

    <!-- OVERLAY -->
    <div id="overlay" class="overlay"></div>

    <!-- SCRIPTS -->
    <script src="script.js"></script>
</body>
</html>
